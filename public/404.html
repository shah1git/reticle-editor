<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>RIKA Reticle Tools</title>
    <script type="text/javascript">
      // GitHub Pages SPA fallback (rafgraph/spa-github-pages).
      // Encode the requested deep-link path into a query string and bounce
      // through the SPA root so BrowserRouter can pick it up on load.
      //
      // The site has two deploys sharing one 404.html:
      //   /reticle-editor/        — main build  (pathSegmentsToKeep = 1)
      //   /reticle-editor/dev/    — dev build   (pathSegmentsToKeep = 2)
      // Detect which one the visitor hit and keep that many leading segments.
      var l = window.location;
      var pathSegmentsToKeep = l.pathname.indexOf('/reticle-editor/dev/') === 0 ? 2 : 1;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
